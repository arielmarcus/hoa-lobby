<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <title>קרן היסוד 5</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@200;300;400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Header -->
    <header id="header">
      <div id="header-start">
        <div id="clock"></div>
        <div id="dates">
          <div id="gregorian-date"></div>
          <div id="hebrew-date"></div>
        </div>
      </div>
      <div id="building-name">
        <div id="welcome-text">ברוכים הבאים ל</div>
        <div id="building-title">קרן היסוד 5</div>
      </div>
      <div id="header-end">
        <div id="weather-mini">
          <span id="weather-icon-mini"></span>
          <span id="weather-temp-mini"></span>
        </div>
        <div id="weather-desc-mini"></div>
      </div>
    </header>

    <!-- Main 3-column layout (RTL: right=col1, center=col2, left=col3) -->
    <main id="main">

      <!-- Col 1 (visual right): Shabbat + Announcements -->
      <aside id="sidebar">
        <div class="panel" id="shabbat-panel">
          <div class="panel-title">זמני שבת</div>
          <div id="shabbat-content"><span class="loading">טוען…</span></div>
        </div>
        <div class="panel" id="announcements-panel">
          <div class="panel-title">הודעות לדיירים</div>
          <div id="announcements-content"><span class="loading">טוען…</span></div>
        </div>
      </aside>

      <!-- Col 2 (center): Rotating image -->
      <div id="image-panel">
        <div id="bg-image"></div>
        <div id="image-overlay"></div>
      </div>

      <!-- Col 3 (visual left): News headlines -->
      <div id="news-panel">
        <div class="panel-title">חדשות</div>
        <div id="news-list"></div>
      </div>

    </main>

    <!-- News ticker -->
    <footer id="ticker-bar">
      <div id="ticker-label">חדשות</div>
      <div id="ticker-wrapper">
        <div id="ticker-content"></div>
      </div>
    </footer>

    <!-- Shabbat mode full-screen overlay -->
    <div id="shabbat-overlay">
      <div id="shabbat-overlay-clock"></div>
      <div id="shabbat-overlay-date"></div>
      <div id="shabbat-overlay-weather"></div>
      <div id="shabbat-overlay-times">
        <div class="shabbat-overlay-row">
          <span class="shabbat-overlay-label">🕯️ הדלקת נרות</span>
          <span class="shabbat-overlay-time" id="shabbat-candle-time"></span>
        </div>
        <div class="shabbat-overlay-row">
          <span class="shabbat-overlay-label">✨ הבדלה</span>
          <span class="shabbat-overlay-time" id="shabbat-havdalah-time"></span>
        </div>
      </div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
